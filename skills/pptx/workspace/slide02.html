<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
}
.header-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 12pt;
  background: #1E40AF;
}
.content {
  margin: 50pt 80pt;
  flex: 1;
}
h1 {
  color: #1E40AF;
  font-size: 42pt;
  font-weight: bold;
  margin: 0 0 50pt 0;
}
.toc-item {
  margin: 0 0 25pt 0;
}
.toc-number {
  display: inline-block;
  width: 50pt;
  color: #3B82F6;
  font-size: 28pt;
  font-weight: bold;
}
.toc-text {
  color: #1F2937;
  font-size: 24pt;
}
</style>
</head>
<body>
<div class="header-bar"></div>
<div class="content">
  <h1>目录</h1>
  <div class="toc-item">
    <span class="toc-number">01</span>
    <span class="toc-text">市场分析</span>
  </div>
  <div class="toc-item">
    <span class="toc-number">02</span>
    <span class="toc-text">产品定位</span>
  </div>
  <div class="toc-item">
    <span class="toc-number">03</span>
    <span class="toc-text">场景细分</span>
  </div>
  <div class="toc-item">
    <span class="toc-number">04</span>
    <span class="toc-text">财务预测</span>
  </div>
</div>
</body>
</html>

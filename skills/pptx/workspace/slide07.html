<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
}
.header-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #1E40AF;
}
.side-bar {
  position: absolute;
  left: 0;
  top: 6pt;
  bottom: 30pt;
  width: 8pt;
  background: #3B82F6;
}
.content {
  margin: 35pt 60pt 60pt 40pt;
  flex: 1;
}
.section-label {
  color: #3B82F6;
  font-size: 13pt;
  font-weight: bold;
  margin: 0 0 6pt 0;
  letter-spacing: 2pt;
}
h1 {
  color: #1E40AF;
  font-size: 28pt;
  font-weight: bold;
  margin: 0 0 18pt 0;
}
.driver-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10pt;
}
.driver-item {
  background: #F9FAFB;
  border-left: 4pt solid #3B82F6;
  padding: 10pt 16pt;
  border-radius: 4pt;
  flex: 0 0 calc(50% - 5pt);
}
.driver-text {
  color: #1F2937;
  font-size: 14pt;
  margin: 0;
}
.page-number {
  position: absolute;
  bottom: 15pt;
  right: 30pt;
  color: #9CA3AF;
  font-size: 12pt;
}
</style>
</head>
<body>
<div class="header-bar"></div>
<div class="side-bar"></div>
<div class="content">
  <p class="section-label">第一章 / 市场分析</p>
  <h1>市场驱动因素</h1>
  <div class="driver-grid">
    <div class="driver-item">
      <p class="driver-text">移动支付和电子发票普及</p>
    </div>
    <div class="driver-item">
      <p class="driver-text">零售业数字化转型加速</p>
    </div>
    <div class="driver-item">
      <p class="driver-text">物流快递行业快速增长</p>
    </div>
    <div class="driver-item">
      <p class="driver-text">餐饮外卖行业蓬勃发展</p>
    </div>
    <div class="driver-item">
      <p class="driver-text">医疗行业信息化建设</p>
    </div>
  </div>
</div>
<p class="page-number">07</p>
</body>
</html>

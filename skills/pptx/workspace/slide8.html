<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1C2833;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.summary-container {
  text-align: center;
  padding: 40pt 60pt;
}
h1 {
  color: #FFFFFF;
  font-size: 36pt;
  margin: 0 0 30pt 0;
  font-weight: bold;
}
.summary-text {
  color: #ECF0F1;
  font-size: 18pt;
  line-height: 1.6;
  margin: 0 0 35pt 0;
}
.highlight {
  color: #E67E22;
  font-weight: bold;
}
.category-grid {
  display: flex;
  justify-content: center;
  gap: 20pt;
  margin-top: 30pt;
}
.category-item {
  background: #34495E;
  padding: 12pt 20pt;
  border-radius: 6pt;
}
.category-item p {
  color: #FFFFFF;
  font-size: 12pt;
  margin: 0;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="summary-container">
  <h1>打印机分类体系总结</h1>
  <p class="summary-text">
    四大类打印机覆盖从<span class="highlight">家用</span>到<span class="highlight">工业</span>的全场景应用，<br>
    满足不同行业和用途的需求
  </p>
  <div class="category-grid">
    <div class="category-item">
      <p>标签打印机</p>
    </div>
    <div class="category-item">
      <p>工业条码打印机</p>
    </div>
    <div class="category-item">
      <p>家用办公打印机</p>
    </div>
    <div class="category-item">
      <p>票据打印机</p>
    </div>
  </div>
</div>
</body>
</html>

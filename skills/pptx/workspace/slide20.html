<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
}
.header-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #1E40AF;
}
.side-bar {
  position: absolute;
  left: 0;
  top: 6pt;
  bottom: 30pt;
  width: 8pt;
  background: #3B82F6;
}
.content {
  margin: 20pt 60pt 70pt 40pt;
  flex: 1;
}
.section-label {
  color: #3B82F6;
  font-size: 10pt;
  font-weight: bold;
  margin: 0 0 3pt 0;
  letter-spacing: 2pt;
}
h1 {
  color: #1E40AF;
  font-size: 22pt;
  font-weight: bold;
  margin: 0 0 15pt 0;
}
.brand-box {
  background: #DBEAFE;
  padding: 12pt 20pt;
  border-radius: 8pt;
  margin-bottom: 10pt;
}
.brand-label {
  color: #3B82F6;
  font-size: 11pt;
  margin: 0 0 4pt 0;
}
.brand-value {
  color: #1E40AF;
  font-size: 16pt;
  font-weight: bold;
  margin: 0;
}
.slogan-box {
  background: #1E40AF;
  padding: 12pt 20pt;
  border-radius: 8pt;
  text-align: center;
}
.slogan-text {
  color: #ffffff;
  font-size: 20pt;
  font-weight: bold;
  margin: 0;
}
.page-number {
  position: absolute;
  bottom: 15pt;
  right: 30pt;
  color: #9CA3AF;
  font-size: 12pt;
}
</style>
</head>
<body>
<div class="header-bar"></div>
<div class="side-bar"></div>
<div class="content">
  <p class="section-label">第二章 / 产品定位</p>
  <h1>品牌定位</h1>
  <div class="brand-box">
    <p class="brand-label">品牌定位</p>
    <p class="brand-value">专业可靠的打印解决方案专家</p>
  </div>
  <div class="brand-box">
    <p class="brand-label">品牌调性</p>
    <p class="brand-value">专业、可靠、创新</p>
  </div>
  <div class="slogan-box">
    <p class="slogan-text">高效打印，智胜未来</p>
  </div>
</div>
<p class="page-number">20</p>
</body>
</html>

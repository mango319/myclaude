<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
}
.header-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #1E40AF;
}
.side-bar {
  position: absolute;
  left: 0;
  top: 6pt;
  bottom: 30pt;
  width: 8pt;
  background: #3B82F6;
}
.content {
  margin: 30pt 60pt 70pt 40pt;
  flex: 1;
}
.section-label {
  color: #3B82F6;
  font-size: 12pt;
  font-weight: bold;
  margin: 0 0 6pt 0;
  letter-spacing: 2pt;
}
h1 {
  color: #1E40AF;
  font-size: 26pt;
  font-weight: bold;
  margin: 0 0 15pt 0;
}
.new-item {
  background: #DBEAFE;
  padding: 8pt 16pt;
  border-radius: 5pt;
  margin-bottom: 7pt;
}
.new-text {
  color: #1E40AF;
  font-size: 14pt;
  margin: 0;
}
.growth-box {
  background: #1E40AF;
  padding: 10pt 18pt;
  border-radius: 6pt;
  margin-top: 10pt;
}
.growth-label {
  color: #DBEAFE;
  font-size: 11pt;
  margin: 0 0 3pt 0;
}
.growth-value {
  color: #ffffff;
  font-size: 18pt;
  font-weight: bold;
  margin: 0;
}
.page-number {
  position: absolute;
  bottom: 15pt;
  right: 30pt;
  color: #9CA3AF;
  font-size: 12pt;
}
</style>
</head>
<body>
<div class="header-bar"></div>
<div class="side-bar"></div>
<div class="content">
  <p class="section-label">第三章 / 场景细分</p>
  <h1>其他新兴场景</h1>
  <div class="new-item">
    <p class="new-text">自助售货机</p>
  </div>
  <div class="new-item">
    <p class="new-text">停车收费系统</p>
  </div>
  <div class="new-item">
    <p class="new-text">智能秤重设备</p>
  </div>
  <div class="new-item">
    <p class="new-text">排队叫号系统</p>
  </div>
  <div class="growth-box">
    <p class="growth-label">增长潜力</p>
    <p class="growth-value">年增长15%+</p>
  </div>
</div>
<p class="page-number">26</p>
</body>
</html>

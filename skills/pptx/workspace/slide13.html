<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
}
.header-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #1E40AF;
}
.side-bar {
  position: absolute;
  left: 0;
  top: 6pt;
  bottom: 30pt;
  width: 8pt;
  background: #3B82F6;
}
.content {
  margin: 35pt 60pt 60pt 40pt;
  flex: 1;
}
.section-label {
  color: #3B82F6;
  font-size: 13pt;
  font-weight: bold;
  margin: 0 0 6pt 0;
  letter-spacing: 2pt;
}
h1 {
  color: #1E40AF;
  font-size: 28pt;
  font-weight: bold;
  margin: 0 0 20pt 0;
}
.pos-item {
  background: #DBEAFE;
  padding: 14pt 20pt;
  border-radius: 6pt;
  margin-bottom: 12pt;
}
.pos-label {
  color: #3B82F6;
  font-size: 13pt;
  font-weight: bold;
  margin: 0 0 4pt 0;
}
.pos-value {
  color: #1E40AF;
  font-size: 17pt;
  margin: 0;
}
.page-number {
  position: absolute;
  bottom: 15pt;
  right: 30pt;
  color: #9CA3AF;
  font-size: 12pt;
}
</style>
</head>
<body>
<div class="header-bar"></div>
<div class="side-bar"></div>
<div class="content">
  <p class="section-label">第二章 / 产品定位</p>
  <h1>产品定位概述</h1>
  <div class="pos-item">
    <p class="pos-label">目标市场</p>
    <p class="pos-value">中高端商用市场</p>
  </div>
  <div class="pos-item">
    <p class="pos-label">核心价值</p>
    <p class="pos-value">稳定可靠、智能便捷</p>
  </div>
  <div class="pos-item">
    <p class="pos-label">差异化策略</p>
    <p class="pos-value">智能化+定制化服务</p>
  </div>
</div>
<p class="page-number">13</p>
</body>
</html>

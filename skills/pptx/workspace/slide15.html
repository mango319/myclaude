<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
}
.header-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #1E40AF;
}
.side-bar {
  position: absolute;
  left: 0;
  top: 6pt;
  bottom: 30pt;
  width: 8pt;
  background: #3B82F6;
}
.content {
  margin: 30pt 60pt 60pt 40pt;
  flex: 1;
}
.section-label {
  color: #3B82F6;
  font-size: 12pt;
  font-weight: bold;
  margin: 0 0 5pt 0;
  letter-spacing: 2pt;
}
h1 {
  color: #1E40AF;
  font-size: 26pt;
  font-weight: bold;
  margin: 0 0 15pt 0;
}
.adv-item {
  background: #DBEAFE;
  padding: 10pt 16pt;
  border-radius: 6pt;
  margin-bottom: 8pt;
}
.adv-text {
  color: #1E40AF;
  font-size: 14pt;
  margin: 0;
}
.page-number {
  position: absolute;
  bottom: 15pt;
  right: 30pt;
  color: #9CA3AF;
  font-size: 12pt;
}
</style>
</head>
<body>
<div class="header-bar"></div>
<div class="side-bar"></div>
<div class="content">
  <p class="section-label">第二章 / 产品定位</p>
  <h1>核心竞争优势</h1>
  <div class="adv-item">
    <p class="adv-text">打印速度行业领先</p>
  </div>
  <div class="adv-item">
    <p class="adv-text">故障率低于0.5%</p>
  </div>
  <div class="adv-item">
    <p class="adv-text">支持多平台兼容</p>
  </div>
  <div class="adv-item">
    <p class="adv-text">本地化快速响应服务</p>
  </div>
  <div class="adv-item">
    <p class="adv-text">性价比优势明显</p>
  </div>
</div>
<p class="page-number">15</p>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
}
.header-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #1E40AF;
}
.side-bar {
  position: absolute;
  left: 0;
  top: 6pt;
  bottom: 30pt;
  width: 8pt;
  background: #3B82F6;
}
.content {
  margin: 20pt 60pt 70pt 40pt;
  flex: 1;
}
.section-label {
  color: #3B82F6;
  font-size: 10pt;
  font-weight: bold;
  margin: 0 0 3pt 0;
  letter-spacing: 2pt;
}
h1 {
  color: #1E40AF;
  font-size: 22pt;
  font-weight: bold;
  margin: 0 0 12pt 0;
}
.channel-item {
  background: #DBEAFE;
  padding: 8pt 16pt;
  border-radius: 6pt;
  margin-bottom: 8pt;
}
.channel-name {
  color: #1E40AF;
  font-size: 15pt;
  font-weight: bold;
  margin: 0 0 3pt 0;
}
.channel-desc {
  color: #1F2937;
  font-size: 12pt;
  margin: 0;
}
.page-number {
  position: absolute;
  bottom: 15pt;
  right: 30pt;
  color: #9CA3AF;
  font-size: 12pt;
}
</style>
</head>
<body>
<div class="header-bar"></div>
<div class="side-bar"></div>
<div class="content">
  <p class="section-label">第二章 / 产品定位</p>
  <h1>渠道策略</h1>
  <div class="channel-item">
    <p class="channel-name">直销团队</p>
    <p class="channel-desc">服务大客户</p>
  </div>
  <div class="channel-item">
    <p class="channel-name">经销商网络</p>
    <p class="channel-desc">覆盖区域市场</p>
  </div>
  <div class="channel-item">
    <p class="channel-name">电商平台</p>
    <p class="channel-desc">触达中小企业</p>
  </div>
  <div class="channel-item">
    <p class="channel-name">系统集成商</p>
    <p class="channel-desc">行业解决方案</p>
  </div>
</div>
<p class="page-number">19</p>
</body>
</html>

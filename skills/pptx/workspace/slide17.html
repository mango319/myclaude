<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
}
.header-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #1E40AF;
}
.side-bar {
  position: absolute;
  left: 0;
  top: 6pt;
  bottom: 30pt;
  width: 8pt;
  background: #3B82F6;
}
.content {
  margin: 30pt 60pt 60pt 40pt;
  flex: 1;
}
.section-label {
  color: #3B82F6;
  font-size: 12pt;
  font-weight: bold;
  margin: 0 0 5pt 0;
  letter-spacing: 2pt;
}
h1 {
  color: #1E40AF;
  font-size: 26pt;
  font-weight: bold;
  margin: 0 0 15pt 0;
}
.client-item {
  background: #DBEAFE;
  padding: 10pt 18pt;
  border-radius: 6pt;
  margin-bottom: 8pt;
}
.client-text {
  color: #1E40AF;
  font-size: 15pt;
  margin: 0;
}
.page-number {
  position: absolute;
  bottom: 15pt;
  right: 30pt;
  color: #9CA3AF;
  font-size: 12pt;
}
</style>
</head>
<body>
<div class="header-bar"></div>
<div class="side-bar"></div>
<div class="content">
  <p class="section-label">第二章 / 产品定位</p>
  <h1>目标客户画像</h1>
  <div class="client-item">
    <p class="client-text">连锁零售企业</p>
  </div>
  <div class="client-item">
    <p class="client-text">餐饮连锁品牌</p>
  </div>
  <div class="client-item">
    <p class="client-text">物流快递公司</p>
  </div>
  <div class="client-item">
    <p class="client-text">医疗机构</p>
  </div>
  <div class="client-item">
    <p class="client-text">政府部门</p>
  </div>
</div>
<p class="page-number">17</p>
</body>
</html>

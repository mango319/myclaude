<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
}
.header-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #1E40AF;
}
.side-bar {
  position: absolute;
  left: 0;
  top: 6pt;
  bottom: 30pt;
  width: 8pt;
  background: #3B82F6;
}
.content {
  margin: 35pt 50pt 60pt 40pt;
  flex: 1;
}
.section-label {
  color: #3B82F6;
  font-size: 13pt;
  font-weight: bold;
  margin: 0 0 6pt 0;
  letter-spacing: 2pt;
}
h1 {
  color: #1E40AF;
  font-size: 28pt;
  font-weight: bold;
  margin: 0 0 20pt 0;
}
.comp-section {
  margin-bottom: 18pt;
}
.comp-title {
  color: #3B82F6;
  font-size: 15pt;
  font-weight: bold;
  margin: 0 0 6pt 0;
}
.comp-brands {
  color: #1F2937;
  font-size: 15pt;
  margin: 0 0 5pt 0;
}
.comp-stat {
  color: #1F2937;
  font-size: 15pt;
  margin: 0;
}
.page-number {
  position: absolute;
  bottom: 15pt;
  right: 30pt;
  color: #9CA3AF;
  font-size: 12pt;
}
</style>
</head>
<body>
<div class="header-bar"></div>
<div class="side-bar"></div>
<div class="content">
  <p class="section-label">第一章 / 市场分析</p>
  <h1>竞争格局分析</h1>
  <div class="comp-section">
    <p class="comp-title">国际品牌</p>
    <p class="comp-brands">EPSON、星云、Zebra</p>
  </div>
  <div class="comp-section">
    <p class="comp-title">国内龙头</p>
    <p class="comp-brands">汉印、芯烨、爱印</p>
  </div>
  <div class="comp-section">
    <p class="comp-title">市场集中度</p>
    <p class="comp-stat">CR5约55%</p>
  </div>
  <div class="comp-section">
    <p class="comp-title">竞争态势</p>
    <p class="comp-stat">品牌集中度提升</p>
  </div>
</div>
<p class="page-number">09</p>
</body>
</html>

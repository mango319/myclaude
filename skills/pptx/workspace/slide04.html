<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
}
.header-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #1E40AF;
}
.side-bar {
  position: absolute;
  left: 0;
  top: 6pt;
  bottom: 30pt;
  width: 8pt;
  background: #3B82F6;
}
.content {
  margin: 40pt 50pt 40pt 40pt;
  flex: 1;
  display: flex;
}
.left-col {
  flex: 1;
  margin-right: 30pt;
}
.right-col {
  width: 320pt;
}
.section-label {
  color: #3B82F6;
  font-size: 14pt;
  font-weight: bold;
  margin: 0 0 10pt 0;
  letter-spacing: 2pt;
}
h1 {
  color: #1E40AF;
  font-size: 32pt;
  font-weight: bold;
  margin: 0 0 25pt 0;
}
.highlight-box {
  background: #DBEAFE;
  padding: 25pt;
  border-radius: 8pt;
  margin-bottom: 20pt;
}
.big-number {
  color: #1E40AF;
  font-size: 48pt;
  font-weight: bold;
  margin: 0 0 8pt 0;
}
.label {
  color: #1F2937;
  font-size: 14pt;
  margin: 0;
}
.stat-item {
  margin-bottom: 18pt;
}
.stat-label {
  color: #6B7280;
  font-size: 13pt;
  margin: 0 0 5pt 0;
}
.stat-value {
  color: #1E40AF;
  font-size: 22pt;
  font-weight: bold;
  margin: 0;
}
.page-number {
  position: absolute;
  bottom: 15pt;
  right: 30pt;
  color: #9CA3AF;
  font-size: 12pt;
}
</style>
</head>
<body>
<div class="header-bar"></div>
<div class="side-bar"></div>
<div class="content">
  <div class="left-col">
    <p class="section-label">第一章 / 市场分析</p>
    <h1>全球市场规模</h1>
    <div class="highlight-box">
      <p class="big-number">85亿美元</p>
      <p class="label">2024年市场规模</p>
    </div>
  </div>
  <div class="right-col">
    <div class="stat-item">
      <p class="stat-label">2029年预计规模</p>
      <p class="stat-value">130亿美元</p>
    </div>
    <div class="stat-item">
      <p class="stat-label">年复合增长率(CAGR)</p>
      <p class="stat-value">8.5%</p>
    </div>
    <div class="stat-item">
      <p class="stat-label">数据来源</p>
      <p class="stat-value" style="font-size: 16pt; font-weight: normal;">行业研究报告</p>
    </div>
  </div>
</div>
<p class="page-number">04</p>
</body>
</html>
